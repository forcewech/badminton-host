services:
  postgres:
    image: postgres:16-alpine
    container_name: badminton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-badminton_court}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: badminton-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-badminton_court}
      FRONTEND_URL: ${ADMIN_WEB_URL:-http://160.25.81.212:5173/}
      CUSTOMER_FRONTEND_URL: ${CUSTOMER_WEB_URL:-http://160.25.81.212:5174/}
    depends_on:
      - postgres
    ports:
      - "${PORT:-3000}:3000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: badminton-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  customer-web:
    build:
      context: ./apps/customer-web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: badminton-customer-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${CUSTOMER_FRONTEND_PORT:-5174}:80"

volumes:
  postgres-data:
