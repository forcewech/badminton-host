services:
  postgres:
    image: postgres:16-alpine
    container_name: badminton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-badminton_court}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: badminton-api
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-badminton_court}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
    depends_on:
      - postgres
    ports:
      - "${PORT:-3000}:3000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: badminton-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres-data:
